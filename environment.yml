name: drug_target_pipeline
channels:
  - conda-forge
  - bioconda
  - defaults

dependencies:
  # Core Python
  - python=3.10
  - pip

  # Data handling
  - pandas=2.0
  - numpy=1.24
  - biopython=1.81

  # Machine learning (Week 3-4)
  - scikit-learn=1.3
  - xgboost=1.7
  - imbalanced-learn

  # Visualization
  - matplotlib=3.7
  - seaborn=0.12
  - plotly=5.15

  # Workflow (Week 8)
  - snakemake-minimal=7.32

  # Notebooks
  - jupyter
  - ipykernel

  # Utilities
  - requests
  - tqdm
  - pyyaml

  # Bioinformatics tools
  - blast=2.14        # for human homolog filtering (Week 2)

  - pip:
    - protlearn       # protein feature extraction (Week 3)
    - streamlit       # dashboard (Week 9)
    - py3Dmol         # 3D structure viewer (Week 9)
    - stmol           # Streamlit 3D viewer wrapper
